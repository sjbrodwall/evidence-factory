name: evidence-factory

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build-evidence:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write   # for keyless signing on main

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train
        run: python src/train.py --out-dir build --seed 42

      - name: Eval
        run: python src/eval.py --build-dir build --out build/eval.json

      - name: Prepare evidence directory
        run: mkdir -p evidence

      # SBOM into evidence/
      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: evidence/sbom.spdx.json
          upload-artifact: false

      # Vuln scan into evidence/
      - name: Trivy scan (repo filesystem)
        uses: aquasecurity/trivy-action@0.34.1
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "evidence/trivy.sarif"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
          exit-code: "1"

      - name: Assemble evidence pack
        run: |
          python scripts/make_evidence_pack.py --build-dir build --docs-dir docs --evidence-dir evidence --out-tgz evidence/evidence-pack.tgz \
            --git-sha "${{ github.sha }}" \
            --ci-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Install Conftest
        run: |
          curl -sSL -o conftest.tar.gz https://github.com/open-policy-agent/conftest/releases/download/v0.66.0/conftest_0.66.0_Linux_x86_64.tar.gz
          tar -xzf conftest.tar.gz
          sudo mv conftest /usr/local/bin/conftest
          conftest --version

      - name: Policy gate (manifest)
        run: conftest test evidence/manifest.json --policy policy --namespace evidence

      - name: Upload evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: evidence-pack
          path: |
            evidence/evidence-pack.tgz
            evidence/manifest.json
            evidence/sbom.spdx.json
            evidence/trivy.sarif

      # Optional: keyless sign the bundle on main pushes
      - name: Install Cosign
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v4.0.0

      - name: Sign evidence pack (keyless)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob --bundle evidence/evidence-pack.sigstore.json evidence/evidence-pack.tgz

      - name: Upload signature bundle
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: evidence-pack-signature
          path: evidence/evidence-pack.sigstore.json