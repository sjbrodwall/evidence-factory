name: evidence-factory

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build-evidence:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write   # for keyless signing on main

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 #v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 #v5.6.0
        with:
          python-version-file: .python-version

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install dev deps and run tests
        run: |
          pip install -r requirements-dev.txt
          python -m pytest tests/ -v

      - name: Train
        run: python src/train.py --out-dir build --seed 42

      - name: Eval
        run: python src/eval.py --build-dir build --out build/eval.json

      - name: Prepare evidence directory
        run: mkdir -p evidence

      # SBOM into evidence/
      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 #v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: evidence/sbom.spdx.json
          upload-artifact: false

      # Vuln scan into evidence/
      - name: Trivy scan (repo filesystem)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 #v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "evidence/trivy.sarif"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
          exit-code: "1"

      - name: Assemble evidence pack
        run: |
          python scripts/make_evidence_pack.py --build-dir build --evidence-dir evidence --out-tgz evidence/evidence-pack.tgz \
            --git-sha "${{ github.sha }}" \
            --ci-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Install Conftest
        run: |
          curl -sSL -o conftest.tar.gz https://github.com/open-policy-agent/conftest/releases/download/v0.66.0/conftest_0.66.0_Linux_x86_64.tar.gz
          tar -xzf conftest.tar.gz
          sudo mv conftest /usr/local/bin/conftest
          conftest --version

      - name: Policy unit tests (Rego)
        run: conftest verify --policy policy

      - name: Policy gate (manifest)
        run: conftest test evidence/manifest.json --policy policy --namespace evidence

      - name: Upload evidence artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: evidence-pack
          path: |
            evidence/evidence-pack.tgz
            evidence/manifest.json
            evidence/sbom.spdx.json
            evidence/trivy.sarif

      # Optional: keyless sign the bundle on main pushes
      - name: Install Cosign
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 #v4.1.0

      - name: Sign evidence pack (keyless)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob --bundle evidence/evidence-pack.sigstore.json evidence/evidence-pack.tgz

      - name: Upload signature bundle
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: evidence-pack-signature
          path: evidence/evidence-pack.sigstore.json
